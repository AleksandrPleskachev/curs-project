<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали договора</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">СтройКомпания</a>
        <div class="navbar-nav ms-auto">
            <span class="navbar-text me-3">Привет, <span th:text="${username}">Пользователь</span>!</span>
            <a class="nav-link" href="/logout">Выйти</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 th:text="${contract.number}">Договор</h1>
        <div>
            <a href="/contracts" class="btn btn-secondary">Назад к списку</a>
            <a th:href="@{/contracts/{id}/edit(id=${contract.id})}" class="btn btn-warning">Редактировать</a>
        </div>
    </div>
    
    <div class="card">
        <div class="card-body">
            <h5 class="card-title">Информация о договоре</h5>
            <div class="row mb-3">
                <div class="col-md-4"><strong>ID:</strong></div>
                <div class="col-md-8" th:text="${contract.id}"></div>
            </div>
            <div class="row mb-3">
                <div class="col-md-4"><strong>Номер:</strong></div>
                <div class="col-md-8" th:text="${contract.number}"></div>
            </div>
            <div class="row mb-3">
                <div class="col-md-4"><strong>Дата подписания:</strong></div>
                <div class="col-md-8" th:text="${#temporals.format(contract.signingDate, 'dd.MM.yyyy')}"></div>
            </div>
            <div class="row mb-3">
                <div class="col-md-4"><strong>Сумма:</strong></div>
                <div class="col-md-8" th:text="${contract.amount} ₽"></div>
            </div>
            <div class="row mb-3">
                <div class="col-md-4"><strong>Статус:</strong></div>
                <div class="col-md-8">
                    <span th:if="${contract.status == 'ACTIVE'}" class="badge bg-success">Действует</span>
                    <span th:if="${contract.status == 'SIGNED'}" class="badge bg-primary">Подписан</span>
                    <span th:if="${contract.status == 'EXPIRED'}" class="badge bg-secondary">Истек</span>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-4"><strong>Проект:</strong></div>
                <div class="col-md-8" th:text="${contract.project.name}"></div>
            </div>
        </div>
    </div>
    
    <!-- Действия -->
    <div class="mt-4">
        <form th:action="@{/contracts/{id}/delete(id=${contract.id})}" method="post">
            <button type="submit" class="btn btn-danger" onclick="return confirm('Вы уверены, что хотите удалить этот договор?');">Удалить договор</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
