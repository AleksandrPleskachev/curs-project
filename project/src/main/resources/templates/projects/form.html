<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${project.id != null} ? 'Редактирование проекта' : 'Новый проект'">Форма проекта</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .form-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            padding: 2rem;
            margin-top: 2rem;
        }
        .form-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .form-header h1 {
            color: #333;
            font-weight: 600;
        }
        .form-header h1 i {
            color: #667eea;
            margin-right: 1rem;
        }
        .btn-custom {
            padding: 0.7rem 1.5rem;
            border-radius: 10px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn-primary-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3);
        }
        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary-custom {
            background-color: #6c757d;
            border: none;
        }
        .btn-secondary-custom:hover {
            background-color: #5a6268;
        }
        .form-label {
            font-weight: 500;
            color: #333;
        }
        .form-control, .form-select {
            border: 2px solid #e0e0e0;
            padding: 0.75rem;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.1);
        }
        .required::after {
            content: " *";
            color: #dc3545;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">
                <i class="bi bi-building-fill me-2"></i>СтройКомпания
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">
                            <i class="bi bi-house-door me-1"></i>Главная
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/tasks/my">
                            <i class="bi bi-list-task me-1"></i>Мои задачи
                        </a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle me-1"></i>Профиль
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="/profile"><i class="bi bi-person me-2"></i>Мой профиль</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="/logout"><i class="bi bi-box-arrow-right me-2"></i>Выйти</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-card">
            <div class="form-header">
                <h1>
                    <i class="bi bi-clipboard-data"></i>
                    <span th:text="${project.id != null} ? 'Редактирование проекта' : 'Создание нового проекта'">Форма проекта</span>
                </h1>
                <p class="text-muted mb-0">Заполните информацию о проекте</p>
            </div>

            <form th:action="${project.id != null} ? @{/projects/{id}(id=${project.id})} : @{/projects}" 
                  th:object="${project}" 
                  method="post">
                
                <!-- Hidden ID field for editing -->
                <input type="hidden" th:if="${project.id != null}" th:field="*{id}">
                
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label for="name" class="form-label required">Название проекта</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-building"></i></span>
                            <input type="text" class="form-control" id="name" th:field="*{name}" placeholder="Введите название проекта" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="address" class="form-label required">Адрес объекта</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-geo-fill"></i></span>
                            <input type="text" class="form-control" id="address" th:field="*{address}" placeholder="Город, улица, дом" required>
                        </div>
                    </div>
                </div>
                
                <div class="row mb-4">
                    <div class="col-md-4">
                        <label for="budget" class="form-label required">Бюджет (руб.)</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-cash-stack"></i></span>
                            <input type="number" class="form-control" id="budget" th:field="*{budget}" min="0" step="0.01" placeholder="0.00" required>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label for="startDate" class="form-label required">Дата начала</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-calendar-start"></i></span>
                            <input type="date" class="form-control" id="startDate" th:field="*{startDate}" required>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label for="endDate" class="form-label required">Дата окончания</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-calendar-end"></i></span>
                            <input type="date" class="form-control" id="endDate" th:field="*{endDate}" required>
                        </div>
                    </div>
                </div>
                
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label for="status" class="form-label required">Статус</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-box-seam"></i></span>
                            <select class="form-select" id="status" th:field="*{status}">
                                <option value="ACTIVE" selected>В работе</option>
                                <option value="COMPLETED">Завершен</option>
                                <option value="PAUSED">Приостановлен</option>
                                <option value="CANCELLED">Отменен</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="customerId" class="form-label required">Заказчик</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-people"></i></span>
                            <select class="form-select" id="customerId" th:field="*{customer.id}" required>
                                <option value="" disabled selected>Выберите заказчика</option>
                                <option th:each="customer : ${customers}"
                                        th:value="${customer.id}"
                                        th:text="${customer.name}"
                                        th:selected="${project.customer != null and project.customer.id == customer.id}">
                                </option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="d-flex justify-content-between align-items-center mt-5 pt-4 border-top">
                    <a href="/projects" class="btn btn-custom btn-secondary-custom">
                        <i class="bi bi-x-circle me-2"></i>Отмена
                    </a>
                    <button type="submit" class="btn btn-custom btn-primary-custom">
                        <i class="bi bi-save me-2"></i>
                        <span th:text="${project.id != null} ? 'Сохранить изменения' : 'Создать проект'">Сохранить</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
