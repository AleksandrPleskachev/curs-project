<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали сметы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">СтройКомпания</a>
        <div class="navbar-nav ms-auto">
            <span class="navbar-text me-3">Привет, <span th:text="${username}">Пользователь</span>!</span>
            <a class="nav-link" href="/logout">Выйти</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 th:text="'Смета #' + ${estimate.id}">Смета</h1>
        <div>
            <a href="/estimates" class="btn btn-secondary">Назад к списку</a>
            <a th:href="@{/estimates/{id}/edit(id=${estimate.id})}" class="btn btn-warning">Редактировать</a>
        </div>
    </div>
    
    <div class="card">
        <div class="card-body">
            <h5 class="card-title">Информация о смете</h5>
            <div class="row mb-3">
                <div class="col-md-4"><strong>ID:</strong></div>
                <div class="col-md-8" th:text="${estimate.id}"></div>
            </div>
            <div class="row mb-3">
                <div class="col-md-4"><strong>Сумма:</strong></div>
                <div class="col-md-8"><span th:text="${estimate.totalCost}">0</span> ₽</div>
            </div>
            <div class="row mb-3">
                <div class="col-md-4"><strong>Валюта:</strong></div>
                <div class="col-md-8" th:text="${estimate.currency}"></div>
            </div>
            <div class="row mb-3">
                <div class="col-md-4"><strong>Дата создания:</strong></div>
                <div class="col-md-8" th:text="${#temporals.format(estimate.creationDate, 'dd.MM.yyyy')}"></div>
            </div>
            <div class="row mb-3">
                <div class="col-md-4"><strong>Статус:</strong></div>
                <div class="col-md-8">
                    <span th:if="${estimate.status == 'DRAFT'}" class="badge bg-secondary">Черновик</span>
                    <span th:if="${estimate.status == 'APPROVED'}" class="badge bg-success">Утверждена</span>
                    <span th:if="${estimate.status == 'REJECTED'}" class="badge bg-danger">Отклонена</span>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-4"><strong>Проект:</strong></div>
                <div class="col-md-8" th:text="${estimate.project.name}"></div>
            </div>
        </div>
    </div>
    
    <!-- Действия -->
    <div class="mt-4">
        <form th:action="@{/estimates/{id}/delete(id=${estimate.id})}" method="post">
            <button type="submit" class="btn btn-danger" onclick="return confirm('Вы уверены, что хотите удалить эту смету?');">Удалить смету</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
