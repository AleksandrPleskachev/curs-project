<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали сотрудника</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">СтройКомпания</a>
        <div class="navbar-nav ms-auto">
            <span class="navbar-text me-3">Привет, <span th:text="${username}">Пользователь</span>!</span>
            <a class="nav-link" href="/logout">Выйти</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 th:text="${employee.name}">Имя сотрудника</h1>
        <div>
            <a href="/employees" class="btn btn-secondary">Назад к списку</a>
            <a th:href="@{/employees/{id}/edit(id=${employee.id})}" class="btn btn-warning">Редактировать</a>
        </div>
    </div>
    
    <div class="card">
        <div class="card-body">
            <h5 class="card-title">Информация о сотруднике</h5>
            <div class="row mb-3">
                <div class="col-md-4"><strong>ID:</strong></div>
                <div class="col-md-8" th:text="${employee.id}"></div>
            </div>
            <div class="row mb-3">
                <div class="col-md-4"><strong>Имя:</strong></div>
                <div class="col-md-8" th:text="${employee.name}"></div>
            </div>
            <div class="row mb-3">
                <div class="col-md-4"><strong>Должность:</strong></div>
                <div class="col-md-8" th:text="${employee.position}"></div>
            </div>
            <div class="row mb-3">
                <div class="col-md-4"><strong>Email:</strong></div>
                <div class="col-md-8" th:text="${employee.email}"></div>
            </div>
            <div class="row mb-3">
                <div class="col-md-4"><strong>Телефон:</strong></div>
                <div class="col-md-8" th:text="${employee.phone}"></div>
            </div>
        </div>
    </div>
    
    <!-- Сводка по задачам -->
    <div class="card mt-4">
        <div class="card-header">
            <h5 class="mb-0">Задачи сотрудника</h5>
        </div>
        <div class="card-body">
            <div th:if="${#lists.isEmpty(employee.tasks)}" class="alert alert-info">
                Сотрудник не прикреплен к задачам.
            </div>
            <div th:if="${#lists.size(employee.tasks) > 0}">
                <table class="table table-sm">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Название</th>
                            <th>Описание</th>
                            <th>Статус</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="task : ${employee.tasks}">
                            <td th:text="${task.id}"></td>
                            <td th:text="${task.name}"></td>
                            <td th:text="${task.description}"></td>
                            <td>
                                <span th:if="${task.status == 'TODO'}" class="badge bg-secondary">Новая</span>
                                <span th:if="${task.status == 'IN_PROGRESS'}" class="badge bg-primary">В работе</span>
                                <span th:if="${task.status == 'DONE'}" class="badge bg-success">Готово</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- Действия -->
    <div class="mt-4">
        <form th:action="@{/employees/{id}/delete(id=${employee.id})}" method="post">
            <button type="submit" class="btn btn-danger" onclick="return confirm('Вы уверены, что хотите удалить этого сотрудника?');">Удалить сотрудника</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
