<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задачи - СтройКомпания</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar-custom {
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .card {
            border: none;
            box-shadow: 0 3px 10px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }
        .card-header {
            background-color: #fff;
            border-bottom: 2px solid #f0f0f0;
        }
        .btn-sm {
            padding: 0.35rem 0.75rem;
            font-size: 0.85rem;
        }
        .table {
            margin-bottom: 0;
        }
        .badge-custom {
            padding: 0.4rem 0.8rem;
            border-radius: 15px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">
                <i class="bi bi-building-fill me-2"></i>СтройКомпания
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">
                            <i class="bi bi-house-door me-1"></i>Главная
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/tasks/my">
                            <i class="bi bi-list-task me-1"></i>Мои задачи
                        </a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle me-1"></i>Профиль
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="/profile"><i class="bi bi-person me-2"></i>Мой профиль</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="/logout"><i class="bi bi-box-arrow-right me-2"></i>Выйти</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-list-check me-2 text-primary"></i>Задачи</h2>
            <div>
                <a href="/dashboard" class="btn btn-secondary btn-sm me-2">
                    <i class="bi bi-arrow-left me-1"></i>В панель
                </a>
                <a href="/tasks/new" class="btn btn-success btn-sm" th:if="${isAdmin}">
                    <i class="bi bi-plus-circle me-1"></i>Новая задача
                </a>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Название</th>
                                <th>Приоритет</th>
                                <th>Статус</th>
                                <th>Проект</th>
                                <th th:if="${isAdmin}">Исполнитель</th>
                                <th th:if="${isAdmin}">Действия</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="task : ${tasks}">
                                <td th:text="${task.id}"></td>
                                <td th:text="${task.name}"></td>
                                <td>
                                    <span th:if="${task.priority == 'HIGH'}" class="badge bg-danger badge-custom">
                                        <i class="bi bi-exclamation-triangle me-1"></i>Высокий
                                    </span>
                                    <span th:if="${task.priority == 'MEDIUM'}" class="badge bg-warning text-dark badge-custom">
                                        <i class="bi bi-dash-circle me-1"></i>Средний
                                    </span>
                                    <span th:if="${task.priority == 'LOW'}" class="badge bg-secondary badge-custom">
                                        <i class="bi bi-circle me-1"></i>Низкий
                                    </span>
                                </td>
                                <td>
                                    <span th:if="${task.status == 'TODO'}" class="badge bg-secondary badge-custom">
                                        <i class="bi bi-clock me-1"></i>Новая
                                    </span>
                                    <span th:if="${task.status == 'IN_PROGRESS'}" class="badge bg-primary badge-custom">
                                        <i class="bi bi-play-fill me-1"></i>В работе
                                    </span>
                                    <span th:if="${task.status == 'DONE'}" class="badge bg-success badge-custom">
                                        <i class="bi bi-check-circle me-1"></i>Готово
                                    </span>
                                </td>
                                <td th:text="${task.project.name}"></td>
                                <td th:if="${isAdmin}" th:text="${task.employee != null ? task.employee.name : 'Не назначено'}"></td>
                                <td th:if="${isAdmin}">
                                    <a th:href="@{/tasks/{id}(id=${task.id})}" class="btn btn-sm btn-info">Просмотр</a>
                                    <a th:href="@{/tasks/{id}/edit(id=${task.id})}" class="btn btn-sm btn-warning">Редакт.</a>
                                    <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post" style="display:inline;">
                                        <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Удалить задачу?');">Удал.</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="text-center mt-3">
            <a href="/dashboard" class="btn btn-secondary">Назад в панель управления</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
